server.port=8080

# H2 in-memory database - good enough for the lab, swap to MySQL in prod
spring.datasource.url=jdbc:h2:mem:experiment9db;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT secret - in real apps put this in environment variables or vault
jwt.secret=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
jwt.expiration=86400000

# Google OAuth2 - replace with real credentials from Google Cloud Console
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile

# Frontend URL for CORS
app.frontend-url=http://localhost:3000
app.oauth2.redirect-uri=http://localhost:3000/oauth2/callback

logging.level.org.springframework.security=DEBUG
